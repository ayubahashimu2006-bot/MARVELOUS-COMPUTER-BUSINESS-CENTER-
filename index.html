<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MARVELOUS COMPUTER BUSINESS CENTER</title><style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
min-height:100vh;
overflow-x:hidden;
color:white;
background:#05070d;
}

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
animation:bgSlide 30s infinite;
background-size:cover;
background-position:center;
filter:brightness(0.25) contrast(1.1);
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:radial-gradient(circle at top, rgba(0,255,200,0.08), rgba(0,0,0,0.95));
}

@keyframes bgSlide{
0%{background-image:url('https://images.unsplash.com/photo-1518770660439-4636190af475');}
25%{background-image:url('https://images.unsplash.com/photo-1498050108023-c5249f4df085');}
50%{background-image:url('https://images.unsplash.com/photo-1537432376769-00f5c2f4c8a1');}
75%{background-image:url('https://images.unsplash.com/photo-1581092160607-ee22621dd758');}
100%{background-image:url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b');}
}

header{
text-align:center;
padding:40px 15px;
}

header h1{
font-size:32px;
letter-spacing:3px;
font-weight:900;
text-transform:uppercase;
background:linear-gradient(90deg,#00ffcc,#00aaff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

header p{
margin-top:10px;
font-size:14px;
color:#bdbdbd;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,200,0.2);
padding:20px;
border-radius:18px;
backdrop-filter:blur(15px);
box-shadow:0 0 25px rgba(0,255,200,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 40px rgba(0,255,200,0.25);
}

.card h3{color:#00ffcc;margin-bottom:10px;}
.card p{font-size:13px;color:#dcdcdc;margin-bottom:15px;}

.order{
display:block;
text-align:center;
padding:10px;
border-radius:30px;
background:linear-gradient(90deg,#00ff99,#00ccff);
color:#000;
font-weight:bold;
text-decoration:none;
}

.contact{
text-align:center;
padding:40px 20px;
}

.btn{display:inline-block;padding:12px 18px;border-radius:30px;text-decoration:none;font-weight:bold;margin:6px;}
.whatsapp-btn{background:#25D366;color:white;}
.call-btn{background:#00aaff;color:white;}
.email-btn{background:#ff9800;color:white;}

footer{text-align:center;padding:20px;font-size:12px;color:#888;}
</style></head><body><div class="bg"></div>
<div class="overlay"></div><header>
<h1>MARVELOUS COMPUTER BUSINESS CENTER</h1>
<p>Fintech-Style Digital Services Platform</p>
</header><!-- SERVICES FROM BACKEND --><section class="container" id="services"></section><section class="contact">
<h2>Contact</h2>
<a class="btn whatsapp-btn" href="https://wa.me/2348083538664">WhatsApp</a>
<a class="btn call-btn" href="tel:+2348025383947">Call</a>
<a class="btn email-btn" href="mailto:marvellouscomputercente@gmail.com">Email</a>
</section><footer>
© 2026 MARVELOUS COMPUTER BUSINESS CENTER | Fintech System
</footer><script>
// ===============================
// BACKEND CONNECTION
// ===============================

// CHANGE THIS WHEN YOU DEPLOY BACKEND ONLINE
const API_URL = "http://localhost:3000";

async function loadServices(){
    try{
        const res = await fetch(API_URL + "/services");
        const data = await res.json();

        const container = document.getElementById("services");
        container.innerHTML = "";

        data.forEach(service => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <h3>${service.title}</h3>
                <p>${service.description}</p>
                <a class="order" target="_blank"
                href="https://wa.me/2348083538664?text=${encodeURIComponent(service.whatsappText)}">
                Order on WhatsApp
                </a>
            `;

            container.appendChild(card);
        });

    }catch(err){
        console.log("Backend not connected", err);
    }
}

loadServices();
</script></body>
</html>
